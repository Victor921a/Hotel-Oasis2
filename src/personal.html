<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Datos Personales - Oasis Hotel</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="site-header">
    <div class="container">
      <div class="brand">
        <img src="img/logo-oasis.png" alt="Oasis logo" class="logo">
        <h1>Oasis Hotel</h1>
      </div>
    </div>
  </header>
  <div class="container auth">
    <h2>Datos personales</h2>
    <form id="personalForm">
      <label>Nombre <input type="text" id="firstName" required></label>
      <label>Apellidos <input type="text" id="lastName" required></label>
      <label>Teléfono <input type="tel" id="phone"></label>
      <label>Documento (DNI/Pasaporte) <input type="text" id="doc"></label>
      <label>Dirección <input type="text" id="address"></label>
      <div class="actions">
        <button type="submit" class="btn btn-primary">Completar registro</button>
      </div>
    </form>
  </div>
  <footer class="site-footer">
    <div class="container">
      <p>&copy; Oasis Hotel — Hecho con cuidado</p>
    </div>
  </footer>
  <script src="js/ui.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
