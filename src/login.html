<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Iniciar sesión - Oasis Hotel</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="site-header">
    <div class="container">
      <div class="brand">
        <img src="img/logo-oasis.png" alt="Oasis logo" class="logo">
        <h1>Oasis Hotel</h1>
      </div>
      <nav class="main-nav">
        <a href="register.html" class="btn btn-ghost">Registrarse</a>
      </nav>
    </div>
  </header>
  <div class="container auth">
    <h2>Iniciar sesión</h2>
    <form id="loginForm">
      <label>Email <input type="email" id="loginEmail" required></label>
      <label>Contraseña <input type="password" id="loginPassword" required></label>
      <div class="actions">
        <button type="submit" class="btn btn-primary">Entrar</button>
        <a href="register.html" class="btn btn-ghost">Crear cuenta</a>
      </div>
    </form>
    <p style="text-align:center;margin-top:1rem;font-size:.85rem;color:#8a826f;">
      ¿Eres administrador? Usa
      <code style="background:#f5f0e6;padding:.15rem .4rem;border-radius:4px;">admin@oasishotel.com</code>
      /
      <code style="background:#f5f0e6;padding:.15rem .4rem;border-radius:4px;">admin123</code>
    </p>
  </div>
  <footer class="site-footer">
    <div class="container">
      <p>&copy; Oasis Hotel — Hecho con cuidado</p>
    </div>
  </footer>
  <script src="js/ui.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
